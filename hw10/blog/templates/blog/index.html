{% extends 'single_pages/layout.html' %}

{% block title %}Blog{% endblock %}

{% block content %}
<div class="section">
    <h1 class="section-title">Blog</h1>
    {% for post in posts %}
    <div style="margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid #e5dfd6;">
        <h2><a href="/blog/{{ post.pk }}/">{{ post.title }}</a></h2>
        <p style="opacity: 0.5; font-size: 0.85rem; margin: 8px 0;">{{ post.created_at|date:"Y-m-d" }}</p>
        <p>{{ post.content|truncatewords:30 }}</p>
    </div>
    {% empty %}
    <p>게시물이 없습니다.</p>
    {% endfor %}
</div>
{% endblock %}
