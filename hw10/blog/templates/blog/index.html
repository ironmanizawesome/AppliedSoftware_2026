{% extends 'single_pages/layout.html' %}

{% block title %}Blog{% endblock %}

{% block content %}
<div class="section">
    <h1 class="section-title">Blog</h1>
    {% for post in posts %}
    <div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.created_at }}</p>
        <p>{{ post.content }}</p>
    </div>
    {% empty %}
    <p>게시물이 없습니다.</p>
    {% endfor %}
</div>
{% endblock %}
