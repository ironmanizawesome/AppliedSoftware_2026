<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Flask Home Page</title>
</head>
<body>
    <form id="form_id" onsubmit="post_query(); return false;">
        <h2>구구단 출력하기</h2>
        <label>단 :
            <input type="text" name="dan">
        </label>
        <button type="submit">출력</button>
    </form>

    <div id="results"></div>

    <script>
        function post_query() {
            $.ajax({
                type: "GET",
                url: "/gugudan",
                data: $("#form_id").serialize(),
                success: function(data) {
                    $("#results").html(data);
                },
                dataType: "html"
            });
        }
    </script>
</body>
</html>
